name: ${COMPOSE_PROJECT_NAME:-pulsix}

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4.8}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pulsix_root_123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pulsix}
      MYSQL_USER: ${MYSQL_USER:-pulsix}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pulsix_123}
    command:
      - --character-set-server=${MYSQL_CHARACTER_SET:-utf8mb4}
      - --collation-server=${MYSQL_COLLATION:-utf8mb4_0900_ai_ci}
      - --skip-name-resolve
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ../docs/sql/pulsix-system-infra.sql:/opt/pulsix/init/pulsix-system-infra.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pulsix

  redis:
    image: ${REDIS_IMAGE:-redis:7.4.7}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-pulsix_redis_123}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-pulsix_redis_123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - pulsix

  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:3.9.1}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      KAFKA_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID:-1}@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS:-3}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'echo > /dev/tcp/127.0.0.1/9092'"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - pulsix

  kafka-init:
    image: ${KAFKA_IMAGE:-apache/kafka:3.9.1}
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      KAFKA_INIT_MARKER_FILE: /var/lib/pulsix-kafka-init/.topics-initialized
      KAFKA_INIT_TOPICS: ${KAFKA_INIT_TOPICS:-pulsix.event.raw,pulsix.decision.result,pulsix.decision.log,pulsix.event.dlq,pulsix.config.snapshot}
      KAFKA_DEFAULT_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS:-3}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_DEFAULT_REPLICATION_FACTOR:-1}
    entrypoint:
      - /bin/bash
      - /opt/pulsix/init/01-create-topics.sh
    volumes:
      - ./kafka/init:/opt/pulsix/init:ro
      - kafka-init-state:/var/lib/pulsix-kafka-init
    networks:
      - pulsix

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  kafka-init-state:

networks:
  pulsix:
    name: ${PULSIX_NETWORK_NAME:-pulsix}
