name: pulsix-infra

services:
  mysql:
    image: mysql:8.4.8
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: pulsix
      MYSQL_USER: pulsix
      MYSQL_PASSWORD: pulsix123
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pulsix-net

  redis:
    image: redis:7.4.7
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    volumes:
      - redis-data:/data
    networks:
      - pulsix-net

  kafka:
    image: apache/kafka:3.9.1
    restart: unless-stopped
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - pulsix-net

  flink-jobmanager:
    image: flink:1.20.3-scala_2.12
    restart: unless-stopped
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 768m
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        state.checkpoints.dir: file:///opt/flink/state/checkpoints
        state.savepoints.dir: file:///opt/flink/state/savepoints
    volumes:
      - flink-checkpoints:/opt/flink/state/checkpoints
      - flink-savepoints:/opt/flink/state/savepoints
    networks:
      - pulsix-net

  flink-taskmanager:
    image: flink:1.20.3-scala_2.12
    restart: unless-stopped
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1024m
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        state.checkpoints.dir: file:///opt/flink/state/checkpoints
        state.savepoints.dir: file:///opt/flink/state/savepoints
    volumes:
      - flink-checkpoints:/opt/flink/state/checkpoints
      - flink-savepoints:/opt/flink/state/savepoints
    networks:
      - pulsix-net

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  flink-checkpoints:
  flink-savepoints:

networks:
  pulsix-net:
    driver: bridge
