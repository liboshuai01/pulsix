# Pulsix engine job default configuration
# Priority: classpath defaults < external config file < -D system properties < CLI args

# Job runtime
pulsix.engine.job.name=pulsix-engine-job
pulsix.engine.parallelism=1
pulsix.engine.object-reuse-enabled=true
pulsix.engine.state-backend=hashmap
pulsix.engine.checkpoint.interval-ms=30000
pulsix.engine.checkpoint.min-pause-ms=5000
pulsix.engine.checkpoint.timeout-ms=60000
pulsix.engine.checkpoint.tolerable-failure-number=3
pulsix.engine.event.out-of-orderness-seconds=1

# Local MiniCluster resources
pulsix.engine.task.cpu-cores=1.0
pulsix.engine.task.slots=1
pulsix.engine.task.heap-mb=256
pulsix.engine.task.off-heap-mb=128
pulsix.engine.task.network-mb=64
pulsix.engine.task.managed-mb=128
pulsix.engine.blob-server-port-range=6124-6134
pulsix.engine.local-log-file=

# Snapshot source
pulsix.engine.snapshot-source=demo
pulsix.engine.snapshot-file=
pulsix.engine.snapshot-poll-ms=1000
pulsix.engine.snapshot-jdbc-url=
pulsix.engine.snapshot-jdbc-user=
pulsix.engine.snapshot-jdbc-password=
pulsix.engine.snapshot-scene-code=
pulsix.engine.snapshot-version=
pulsix.engine.snapshot-jdbc-query=
pulsix.engine.snapshot-cdc-host=
pulsix.engine.snapshot-cdc-port=3306
pulsix.engine.snapshot-cdc-database=
pulsix.engine.snapshot-cdc-table=scene_release
pulsix.engine.snapshot-cdc-user=
pulsix.engine.snapshot-cdc-password=
pulsix.engine.snapshot-cdc-server-id=
pulsix.engine.snapshot-cdc-server-time-zone=UTC

# Event source
pulsix.engine.event-source=demo
pulsix.engine.kafka-bootstrap-servers=127.0.0.1:29092
pulsix.engine.event-kafka-topic=pulsix.event.standard
pulsix.engine.event-kafka-group-id=pulsix-engine
pulsix.engine.event-kafka-starting-offsets=latest

# Lookup source
pulsix.engine.lookup-source=demo
pulsix.engine.lookup-redis-host=127.0.0.1
pulsix.engine.lookup-redis-port=6379
pulsix.engine.lookup-redis-database=0
pulsix.engine.lookup-redis-user=
pulsix.engine.lookup-redis-password=pulsix_redis_123
pulsix.engine.lookup-redis-ssl=false
pulsix.engine.lookup-redis-connect-timeout-ms=50
pulsix.engine.lookup-redis-default-timeout-ms=20

# Output sinks
pulsix.engine.output-sink=print
pulsix.engine.result-sink=
pulsix.engine.log-sink=
pulsix.engine.error-sink=
pulsix.engine.result-kafka-topic=pulsix.decision.result
pulsix.engine.log-kafka-topic=pulsix.decision.log
pulsix.engine.error-kafka-topic=pulsix.engine.error
